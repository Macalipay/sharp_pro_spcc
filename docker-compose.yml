services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sharp_pro_spcc_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: smp-project
      DB_USERNAME: sharp_user
      DB_PASSWORD: sharp_password
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www/html
    restart: unless-stopped

  db:
    image: mysql:5.7
    container_name: sharp_pro_spcc_db
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: smp-project
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: sharp_user
      MYSQL_PASSWORD: sharp_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - "./smp-project (3).sql:/docker-entrypoint-initdb.d/01-init.sql:ro"
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: sharp_pro_spcc_phpmyadmin
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root
      UPLOAD_LIMIT: 256M
    ports:
      - "8081:80"
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: sharp_pro_spcc_mailhog
    ports:
      - "8025:8025"
    restart: unless-stopped

volumes:
  mysql_data:
